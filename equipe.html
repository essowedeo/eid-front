<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Équipe — EID HOOP FEST</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    .team-page { min-height: 100vh; padding: 80px 24px 60px; }
    .team-header {
      position: relative; border-radius: var(--radius-xl); overflow: hidden;
      margin-bottom: 24px; min-height: 220px; display: flex; align-items: flex-end;
    }
    .team-header-bg img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .team-header-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(5,5,5,0.95) 0%, rgba(5,5,5,0.4) 100%); }
    .team-header-content { position: relative; z-index: 1; padding: 28px; width: 100%; }
    .team-name { font-family: var(--font-display); font-size: clamp(2rem, 6vw, 3rem); line-height: 1; }
    .team-meta { color: var(--gray-400); font-size: 0.85rem; margin-top: 6px; }
    .team-code-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 20px; margin-bottom: 20px;
    }
    .code-display {
      font-family: var(--font-display); font-size: 2.8rem; letter-spacing: 0.25em;
      color: var(--red); text-align: center; margin: 8px 0;
    }
    .code-label { text-align: center; color: var(--gray-500); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .copy-row { display: flex; gap: 10px; margin-top: 14px; }
    .copy-btn { flex: 1; }
    .counter-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 20px; }
    .counter-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .counter-label { font-size: 0.82rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.06em; }
    .counter-val { font-family: var(--font-display); font-size: 1.6rem; }
    .counter-val span { color: var(--red); }
    .bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(to right, var(--red), #ff6b6b); border-radius: 99px; transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1); }
    .players-section { margin-top: 24px; }
    .players-title { font-family: var(--font-display); font-size: 1.2rem; letter-spacing: 0.06em; margin-bottom: 14px; color: var(--gray-300); }
    .player-item {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
      margin-bottom: 10px; transition: var(--transition);
    }
    .player-item:hover { border-color: var(--border-2); }
    .player-avatar {
      width: 42px; height: 42px; border-radius: 50%; background: var(--surface-3);
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem;
      flex-shrink: 0; color: var(--gray-300);
    }
    .player-avatar.captain { background: rgba(227,25,55,0.15); color: var(--red); border: 1px solid rgba(227,25,55,0.3); }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-sub { color: var(--gray-500); font-size: 0.78rem; }
    .new-banner {
      background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(34,197,94,0.05));
      border: 1px solid rgba(34,197,94,0.25); border-radius: var(--radius-lg);
      padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 12px; align-items: center;
    }
    .new-banner-icon { font-size: 1.8rem; }
    .new-banner-text { font-size: 0.88rem; color: var(--gray-300); }
    .new-banner-text strong { color: #4ade80; }
    .error-state { text-align: center; padding: 80px 24px; }
    
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: 0.3s; backdrop-filter: blur(8px); }
    .modal.open { opacity: 1; pointer-events: all; }
    .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 40px; width: 100%; max-width: 450px; transform: scale(0.95); transition: 0.3s; text-align: center; }
    .modal.open .modal-content { transform: scale(1); }

    /* Payment Box */
    .pay-card {
      background: linear-gradient(135deg, rgba(227,25,55,0.1), rgba(227,25,55,0.05));
      border: 1px solid rgba(227,25,55,0.2); border-radius: var(--radius-lg);
      padding: 24px; margin-bottom: 24px;
    }
    .pay-title { font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 12px; color: var(--red); }
    .pay-detail { font-size: 0.9rem; color: var(--gray-400); margin-bottom: 16px; line-height: 1.6; }
    .pay-info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .pay-info-row:last-of-type { border-bottom: none; }
    .pay-label { color: var(--gray-500); }
    .pay-value { font-weight: 700; color: var(--white); }
  </style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">
    <div class="nav-logo-badge">🏀</div>
    <div class="nav-logo-text">EID <span>HOOP</span> FEST</div>
  </a>
  <div class="nav-links">
    <a href="/equipes.html" class="nav-link">Les Équipes</a>
    <a href="/participer.html" class="nav-cta">Participer</a>
  </div>
</nav>

<div class="team-page">
  <div class="container-sm" id="teamContent">
    <div class="loading-state">
      <div class="spinner" style="margin:0 auto 16px;width:32px;height:32px;border-width:3px;"></div>
      <p>Chargement de l'équipe…</p>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div class="modal" id="successModal">
  <div class="modal-content fade-up">
    <div style="font-size: 4rem; margin-bottom: 16px;" id="successIcon">🎉</div>
    <h2 style="font-family:var(--font-display); font-size:2.5rem; line-height:1; margin-bottom: 12px;" id="successTitle">C'est validé !</h2>
    <p style="color: var(--gray-400); font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px;" id="successMessage"></p>
    <button class="btn btn-primary btn-full" onclick="closeSuccess()">Génial !</button>
  </div>
</div>

<!-- Login Modal -->
<div class="modal" id="loginModal">
  <div class="modal-content fade-up" style="max-width: 400px;">
    <div style="font-size: 3rem; margin-bottom: 16px;">🔐</div>
    <h2 style="font-family:var(--font-display); font-size:2rem; line-height:1; margin-bottom: 12px;">ACCÈS CAPITAINE</h2>
    <p style="color: var(--gray-400); font-size: 0.85rem; line-height: 1.6; margin-bottom: 24px;" id="loginModalMsg">Saisis ton <strong>Code Secret</strong> pour gérer l'équipe.</p>
    
    <div class="form-group" style="text-align: left; margin-bottom: 20px;">
      <label class="form-label">Code Secret</label>
      <input class="form-input" type="password" id="loginSecretInput" placeholder="Ex: 1234" maxlength="6" style="text-align: center; letter-spacing: 0.5em; font-size: 1.2rem;" />
      <span class="form-error" id="loginErr"></span>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <button class="btn btn-ghost" onclick="closeLogin()">Annuler</button>
      <button class="btn btn-primary" id="loginSubmitBtn">Valider</button>
    </div>
  </div>
</div>

<script type="module">
import { getTeam, confirmPlayer, removePlayer, authCaptain } from '/src/api.js';

const params = new URLSearchParams(location.search);
const code = params.get('code');
const isNew = params.get('new') === '1';
const justJoined = params.get('joined') === '1';

function showToast(msg, type = 'success') {
  let t = document.querySelector('.toast');
  if (!t) { t = document.createElement('div'); t.className = 'toast'; document.body.appendChild(t); }
  const icon = type === 'success' ? '✅' : '❌';
  t.innerHTML = `<span style="font-size:1.2rem;">${icon}</span> <span>${msg}</span>`;
  t.className = `toast toast-${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => showToast('✅ Copié !', 'success'))
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const textArea = document.createElement("textarea");
  textArea.value = text;
  textArea.style.position = "fixed";
  textArea.style.left = "-9999px";
  textArea.style.top = "0";
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  try {
    const successful = document.execCommand('copy');
    if (successful) showToast('✅ Copié !', 'success');
    else showToast('Erreur de copie', 'error');
  } catch (err) {
    showToast('Impossible de copier', 'error');
  }
  document.body.removeChild(textArea);
}

async function load() {
  if (!code) { renderError('Code manquant dans l\'URL'); return; }
  try {
    const team = await getTeam(code.toUpperCase());
    render(team);
  } catch (err) {
    renderError(err.message);
  }
}

function renderError(msg) {
  document.getElementById('teamContent').innerHTML = `
    <div class="error-state">
      <div style="font-size:3rem;margin-bottom:16px;color:var(--gray-700);">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      </div>
      <h2 style="font-family:var(--font-display);font-size:1.8rem;margin-bottom:8px;">Équipe introuvable</h2>
      <p style="color:var(--gray-400);margin-bottom:24px;">${msg}</p>
      <a href="/rejoindre.html" class="btn btn-primary">Chercher une équipe</a>
    </div>`;
}

function render(team) {
  const playerCount = team.players.length;
  const pct = Math.round((playerCount / 12) * 100);
  const inviteLink = `${location.origin}/rejoindre.html?code=${team.code}`;

  document.title = `${team.name} — EID HOOP FEST`;

    const isCaptainOfThisTeam = localStorage.getItem('myTeam') && JSON.parse(localStorage.getItem('myTeam')).code === team.code;

    const playersHTML = team.players.map((p, i) => {
      const initial = p.name.charAt(0).toUpperCase();
      return `<div class="player-item">
        <div class="player-avatar ${p.isCaptain ? 'captain' : ''}">${p.isCaptain ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' : initial}</div>
        <div class="player-info">
          <div class="player-name">${p.name}${p.isCaptain ? ' <span style="color:var(--gray-500);font-size:0.75rem;">· Capitaine</span>' : ''}</div>
          <div class="player-sub">${isCaptainOfThisTeam ? (p.phone || 'Pas de téléphone') : '••••••••'}</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="badge ${p.status === 'confirmed' ? 'badge-confirmed' : 'badge-pending'}">
            ${p.status === 'confirmed' ? '✓ Confirmé' : '⏳ Attente'}
          </div>
          ${(isCaptainOfThisTeam && !p.isCaptain) ? `
            <button class="btn btn-ghost" style="padding:6px; border-radius:8px; color:var(--red); border-color:transparent;" onclick="handleRemovePlayer(${p.id}, '${p.name.replace(/'/g, "\\'")}')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></svg>
            </button>
          ` : ''}
        </div>
      </div>`;
    }).join('');

  const emptySlots = Math.max(0, 12 - playerCount);
  const emptySlotsHTML = Array.from({ length: emptySlots }).map(() =>
    `<div class="player-item" style="opacity:0.3;border-style:dashed;">
      <div class="player-avatar" style="background:transparent;border:1px dashed var(--border-2);">+</div>
      <div class="player-info"><div class="player-name" style="color:var(--gray-500);">Place disponible</div></div>
    </div>`
  ).join('');

  document.getElementById('teamContent').innerHTML = `
    <div class="team-header">
      <div class="team-header-bg"><img src="/photos/photo4.jpeg" alt="" /></div>
      <div class="team-header-overlay"></div>
      <div class="team-header-content">
        <div class="team-name">${team.name}</div>
        <div class="team-meta">Capitaine: ${team.captainName} · Créée le ${new Date(team.createdAt).toLocaleDateString('fr-FR')}</div>
      </div>
    </div>

    ${team.paid ? `
    <div class="new-banner" style="background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); margin-bottom:24px;">
      <div class="new-banner-icon" style="color:#4ade80;">✅</div>
      <div class="new-banner-text"><strong style="color:#4ade80;">Inscription Confirmée !</strong><br/>Les frais de participation ont été réglés. Ton équipe est officiellement en lice.</div>
    </div>
    ` : (isCaptainOfThisTeam ? `
    <div class="pay-card fade-up">
      <div class="pay-title">🏀 PAIEMENT DE L'INSCRIPTION</div>
      <p class="pay-detail">Pour valider définitivement ton équipe au tournoi, tu dois régler les frais de <strong>10 000 FCFA</strong>.</p>
      
      <div style="background:rgba(0,0,0,0.2); border-radius:12px; padding:8px 16px; margin-bottom:20px;">
        <div class="pay-info-row">
          <span class="pay-label">Montant</span>
          <span class="pay-value" style="color:#4ade80;">10 000 FCFA</span>
        </div>
        <div class="pay-info-row">
          <span class="pay-label">Numéro Moov</span>
          <span class="pay-value">98 05 61 45</span>
        </div>
        <div class="pay-info-row">
          <span class="pay-label">Nom</span>
          <span class="pay-value">ORGANISATION</span>
        </div>
      </div>

      <a href="https://wa.me/22898056145?text=${encodeURIComponent(`Bonjour, je suis le capitaine de l'équipe *${team.name}* (Code: ${team.code}). Je viens d'effectuer le transfert de 10.000 FCFA pour notre inscription.`)}" 
         target="_blank" class="btn btn-primary btn-full">
         Envoyer ma preuve (WhatsApp)
      </a>
      <p style="text-align:center; font-size:0.75rem; color:var(--gray-500); margin-top:12px;">Une fois l'argent reçu, ton statut passera en "Payé" sous 24h.</p>
    </div>
    ` : '')}

    <div class="counter-bar">
      <div class="counter-top">
        <span class="counter-label">Joueurs</span>
        <span class="counter-val"><span>${playerCount}</span> / 12</span>
      </div>
      <div class="bar"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
    </div>

    ${isCaptainOfThisTeam ? `
    <div class="team-code-box">
      <div class="code-label">Code d'invitation</div>
      <div class="code-display">${team.code}</div>
      <div class="copy-row" style="flex-wrap: wrap;">
        <button class="btn btn-outline copy-btn" id="copyCode" style="flex: 1;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copier
        </button>
        <button class="btn btn-primary copy-btn" id="copyLink" style="flex: 1;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          Lien
        </button>
        <a href="https://wa.me/?text=${encodeURIComponent(`Salut l'équipe ! J'ai inscrit notre team *${team.name}* au tournoi EID HOOP FEST. Clique ici pour rejoindre l'effectif : ${inviteLink} \n\nOu utilise le code secret : ${team.code}`)}" target="_blank" class="btn copy-btn" style="flex: 1; background-color: #25D366; color: white; border-color: #25D366; text-decoration:none;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          WhatsApp
        </a>
      </div>
    </div>
    ` : ''}

    <div class="players-section">
      <div class="players-title">JOUEURS (${playerCount}/12)</div>
      ${playersHTML}
      ${emptySlotsHTML}
    </div>

    <div style="margin-top:28px;display:flex;gap:12px;flex-wrap:wrap;">
      <button class="btn btn-ghost" id="refreshBtn" style="flex:1;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
        Actualiser
      </button>
    </div>

    ${!isCaptainOfThisTeam ? `
      <div style="margin-top: 40px; text-align: center; border-top: 1px solid var(--border); padding-top: 24px;">
        <p style="color: var(--gray-500); font-size: 0.85rem; margin-bottom: 12px;">Tu es le capitaine de cette équipe ?</p>
        <button class="btn btn-outline" style="font-size: 0.8rem; padding: 10px 20px;" onclick="openLogin()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Accès Gestion
        </button>
      </div>
    ` : ''}
  `;

  // Animate bar
  setTimeout(() => { document.getElementById('barFill').style.width = pct + '%'; }, 100);

  if (isCaptainOfThisTeam) {
    document.getElementById('copyCode')?.addEventListener('click', () => copyToClipboard(team.code));
    document.getElementById('copyLink')?.addEventListener('click', () => copyToClipboard(inviteLink));
  }

  document.getElementById('refreshBtn').addEventListener('click', load);

  // Show Success Modal if needed
  if (isNew) {
    showSuccess("🎉", "ÉQUIPE CRÉÉE !", `Ton équipe "${team.name}" est inscrite. Partage le code d'invitation avec tes joueurs.`);
  } else if (justJoined) {
    showSuccess("🔥", "BIENVENUE !", `Tu as rejoint l'équipe "${team.name}". Préparez-vous pour la victoire !`);
  }
}

function showSuccess(icon, title, msg) {
  document.getElementById('successIcon').textContent = icon;
  document.getElementById('successTitle').textContent = title;
  document.getElementById('successMessage').textContent = msg;
  document.getElementById('successModal').classList.add('open');
}

window.closeSuccess = function() {
  document.getElementById('successModal').classList.remove('open');
}

window.openLogin = function() {
  document.getElementById('loginModal').classList.add('open');
  document.getElementById('loginSecretInput').value = '';
  document.getElementById('loginErr').classList.remove('show');
}

window.closeLogin = function() {
  document.getElementById('loginModal').classList.remove('open');
}

document.getElementById('loginSubmitBtn').addEventListener('click', async () => {
  const secret = document.getElementById('loginSecretInput').value.trim();
  const err = document.getElementById('loginErr');
  const btn = document.getElementById('loginSubmitBtn');

  if (!secret) {
    err.textContent = "Saisis le code";
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = "...";

  try {
    const data = await authCaptain(code.toUpperCase(), secret);

    // Success! Save to localStorage
    localStorage.setItem('myTeam', JSON.stringify({
      name: document.title.split(' — ')[0],
      code: code.toUpperCase()
    }));

    showToast("Accès autorisé ! 🔐");
    closeLogin();
    load(); // Refresh to show delete buttons
  } catch (e) {
    err.textContent = e.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = "Valider";
  }
});

window.handleRemovePlayer = async function(id, name) {
  // We can use the same style of confirm modal if we add it to the page
  if (!confirm(`Voulez-vous vraiment retirer ${name} de l'équipe ?`)) return;
  
  try {
    await removePlayer(id);
    showToast(`${name} a été retiré.`);
    load(); // Refresh list
  } catch (err) {
    showToast(err.message, 'error');
  }
}

load();
</script>
</body>
</html>
