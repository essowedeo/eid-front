<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Détails Équipe — EID HOOP FEST</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    .details-page { padding: 120px 24px 60px; min-height: 100vh; }
    .details-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 40px; }
    .player-list { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
    .player-item { 
      display: flex; align-items: center; gap: 16px; padding: 16px 20px; 
      background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg);
    }
    .player-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--surface-3); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; color: var(--gray-400); }
    .player-avatar.cap { background: rgba(227,25,55,0.15); color: var(--red); border: 1px solid rgba(227,25,55,0.3); }
    
    @media (max-width: 640px) {
      .details-card { padding: 24px; }
      .player-item { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">
    <div class="nav-logo-badge">🏀</div>
    <div class="nav-logo-text">EID <span>HOOP</span> FEST</div>
  </a>
  <a href="/equipes.html" class="btn btn-ghost" style="font-size:0.85rem; display:flex; align-items:center; gap:8px;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Retour aux équipes
  </a>
</nav>

<div class="details-page">
  <div class="container-sm">
    <div id="detailsContent">
      <div style="text-align:center; padding:80px; opacity:0.5;">
        <div class="spinner" style="margin:0 auto 20px;"></div>
        Chargement de l'équipe...
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { getTeam } from '/src/api.js';

  const params = new URLSearchParams(location.search);
  const code = params.get('code');

  async function loadDetails() {
    const container = document.getElementById('detailsContent');
    if (!code) {
      container.innerHTML = '<div class="error-msg">Équipe introuvable.</div>';
      return;
    }

    try {
      const team = await getTeam(code.toUpperCase());
      container.innerHTML = `
        <div class="details-card">
          <div class="tag" style="display:inline-flex;margin-bottom:16px;text-transform:uppercase;letter-spacing:0.15em;font-size:0.7rem;background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:var(--gray-400);">Équipe Officielle</div>
          <h1 style="font-family:var(--font-display); font-size:clamp(2.5rem, 8vw, 4rem); line-height:0.9; margin-bottom:12px;">${team.name}</h1>
          <p style="color:var(--gray-500); font-size:1.1rem;">
            Capitaine : <span style="color:var(--white); font-weight:600;">${team.captainName}</span> · 
            Effectif : <span style="color:var(--red); font-weight:700;">${team.players.length}/12</span>
          </p>
          
          <div class="player-list">
            <div style="text-transform:uppercase; font-size:0.8rem; letter-spacing:0.1em; color:var(--gray-500); margin-bottom:8px;">Composition de l'équipe</div>
            ${team.players.map((p, i) => `
              <div class="player-item">
                <div class="player-avatar ${p.isCaptain ? 'cap' : ''}">${p.isCaptain ? '👑' : p.name.charAt(0).toUpperCase()}</div>
                <div style="flex:1;">
                  <div style="font-weight:600; font-size:1.1rem;">${p.name}</div>
                  <div style="font-size:0.8rem; color:var(--gray-500);">${p.isCaptain ? 'Capitaine d\'équipe' : 'Joueur inscrit'}</div>
                </div>
                <div style="font-size:0.75rem; color:#4ade80; background:rgba(74,222,128,0.1); padding:4px 12px; border-radius:99px; border:1px solid rgba(74,222,128,0.2);">CONFIRMÉ</div>
              </div>
            `).join('')}
            ${Array.from({length: 12 - team.players.length}).map(() => `
              <div class="player-item" style="opacity:0.3; border-style:dashed;">
                <div class="player-avatar" style="background:transparent; border:1px dashed var(--border);">+</div>
                <div style="color:var(--gray-600); font-size:1rem;">Place disponible</div>
              </div>
            `).join('')}
          </div>

          <div style="margin-top:40px; padding-top:32px; border-top:1px solid var(--border); display:flex; gap:16px; flex-wrap:wrap;">
            <a href="/equipes.html" class="btn btn-outline btn-lg" style="width:100%; justify-content:center;">Toutes les équipes</a>
          </div>
        </div>
      `;
    } catch (e) {
      container.innerHTML = `<div class="error-msg">Erreur : ${e.message}</div>`;
    }
  }

  loadDetails();
</script>

</body>
</html>
